name: Verify CLAUDE L2 Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-claude-l2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify CLAUDE L2 docs
        run: pnpm docs:verify:claude
